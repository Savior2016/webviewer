<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>momhand - 物品管理</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #f59e0b;
            --danger: #ef4444;
            --bg: #f0fdf4;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text: #1f2937;
            --text-light: #6b7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }
        
        h1 {
            font-size: 42px;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            font-size: 18px;
            opacity: 0.9;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .stat-label {
            color: var(--text-light);
            font-size: 14px;
            margin-top: 5px;
        }
        
        .search-bar {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        
        .search-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .item-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        
        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            border-color: var(--primary);
        }
        
        .item-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 10px;
        }
        
        .item-type {
            display: inline-block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--primary-dark);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 15px;
        }
        
        .item-info {
            font-size: 14px;
            color: var(--text-light);
            margin: 8px 0;
        }
        
        .item-info strong {
            color: var(--text);
        }
        
        .item-location {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .expiry-warning {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 10px;
            font-weight: 500;
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: white;
            font-size: 18px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            background: var(--card-bg);
            border-radius: 16px;
            color: var(--text-light);
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 32px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .items-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 momhand</h1>
            <p class="subtitle">你的智能物品管理助手</p>
        </header>
        
        <div id="stats" class="stats-grid"></div>
        
        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索物品名称、类型、用途...">
        </div>
        
        <div id="itemsGrid" class="items-grid">
            <div class="loading">加载中...</div>
        </div>
    </div>
    
    <script>
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                if (data.success) {
                    const stats = data.data;
                    document.getElementById('stats').innerHTML = `
                        <div class="stat-card">
                            <div class="stat-number">${stats.total}</div>
                            <div class="stat-label">总物品数</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${stats.expiring_soon}</div>
                            <div class="stat-label">即将过期</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${stats.expired}</div>
                            <div class="stat-label">已过期</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-number">${Object.keys(stats.by_location).length}</div>
                            <div class="stat-label">存放位置</div>
                        </div>
                    `;
                }
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }
        
        async function loadItems(keyword = '') {
            try {
                const url = keyword 
                    ? `/api/search?q=${encodeURIComponent(keyword)}`
                    : '/api/items';
                const res = await fetch(url);
                const data = await res.json();
                
                const grid = document.getElementById('itemsGrid');
                
                if (!data.success || !data.data || data.data.length === 0) {
                    grid.innerHTML = '<div class="empty-state">暂无物品，告诉 Friday 你要放置物品吧~</div>';
                    return;
                }
                
                const today = new Date();
                grid.innerHTML = data.data.map(item => {
                    let expiryHtml = '';
                    if (item.expiry_date) {
                        const expiry = new Date(item.expiry_date);
                        const daysLeft = Math.ceil((expiry - today) / (1000 * 60 * 60 * 24));
                        if (daysLeft < 0) {
                            expiryHtml = `<div class="expiry-warning">⚠️ 已过期 ${Math.abs(daysLeft)} 天</div>`;
                        } else if (daysLeft <= 7) {
                            expiryHtml = `<div class="expiry-warning">⚠️ 还有 ${daysLeft} 天过期</div>`;
                        }
                    }
                    
                    return `
                        <div class="item-card">
                            <div class="item-name">${item.name}</div>
                            <div class="item-type">${item.type}</div>
                            ${item.usage ? `<div class="item-info"><strong>用途:</strong> ${item.usage}</div>` : ''}
                            ${item.purchase_date ? `<div class="item-info"><strong>购买:</strong> ${item.purchase_date}</div>` : ''}
                            ${item.price ? `<div class="item-info"><strong>价格:</strong> ¥${item.price}</div>` : ''}
                            ${item.expiry_date ? `<div class="item-info"><strong>保质期至:</strong> ${item.expiry_date}</div>` : ''}
                            <div class="item-location">📍 ${item.location}</div>
                            ${expiryHtml}
                        </div>
                    `;
                }).join('');
            } catch (e) {
                console.error('加载物品失败:', e);
                document.getElementById('itemsGrid').innerHTML = '<div class="empty-state">加载失败，请刷新重试</div>';
            }
        }
        
        // 搜索功能
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadItems(e.target.value);
            }, 300);
        });
        
        // 初始化
        loadStats();
        loadItems();
    </script>
</body>
</html>
