<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报告中心 | Report Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 50px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .badge {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-dark), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: var(--text-secondary);
            font-size: 16px;
        }
        
        .report-list {
            list-style: none;
        }
        
        .report-item {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 16px;
            margin-bottom: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(99, 102, 241, 0.1);
            animation: slideIn 0.5s ease-out backwards;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .report-item:hover {
            transform: translateX(10px) scale(1.02);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }
        
        .report-item a {
            display: block;
            padding: 25px;
            text-decoration: none;
        }
        
        .report-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 18px;
            margin-bottom: 8px;
        }
        
        .report-time {
            color: var(--text-secondary);
            font-size: 14px;
        }
        
        .empty {
            text-align: center;
            color: var(--text-secondary);
            padding: 60px 20px;
            font-size: 16px;
        }
        
        footer {
            margin-top: 50px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 30px 20px;
            }
            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="badge">Report Hub</span>
            <h1>📊 报告中心</h1>
            <p class="subtitle">AI 前沿信息 · 每日更新</p>
        </header>
        <main>
            <ul class="report-list">
            <li class="report-item" style="animation-delay: 0.0s">
                <a href="report_20260302_080001.html">
                    <div class="report-title">📊 AI 前沿日报 · 2026-03-02</div>
                    <div class="report-time">📅 未知</div>
                </a>
            </li>
            <li class="report-item" style="animation-delay: 0.1s">
                <a href="report_20260303_080001.html">
                    <div class="report-title">📊 AI 前沿日报 · 2026-03-03</div>
                    <div class="report-time">📅 未知</div>
                </a>
            </li></ul>
        </main>
        <footer>
            <p>Powered by Friday 🤖</p>
        </footer>
    </div>
</body>
</html>
