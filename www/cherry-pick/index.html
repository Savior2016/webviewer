<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>一搬不丢 - Cherry Pick</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/transitions.css">
  <script src="/js/agent-chat.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { font-family: 'Inter', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
    .gradient-bg { background: linear-gradient(135deg, #4c1d95 0%, #6d28d9 50%, #7c3aed 100%); }
    .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); border: 1px solid rgba(255, 255, 255, 0.2); }
    .floating { animation: floating 3s ease-in-out infinite; }
    @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
    .slide-in { animation: slideIn 0.4s ease-out; }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .expand-in { animation: expandIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); }
    @keyframes expandIn { 0% { transform: scale(0.9) translateY(20px); opacity: 0; } 100% { transform: scale(1) translateY(0); opacity: 1; } }
    .item-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .item-card:hover { transform: translateY(-3px); }
    .item-placed { border-left: 4px solid #10b981; background: linear-gradient(to right, #d1fae5, #f0fdf4); }
    .item-pending { border-left: 4px solid #f59e0b; background: linear-gradient(to right, #fef3c7, #fffbeb); }
    .item-done { border-left: 4px solid #3b82f6; background: linear-gradient(to right, #dbeafe, #eff6ff); }
    .fab-button { position: fixed; bottom: 24px; right: 24px; z-index: 100; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .fab-button:hover { transform: scale(1.1); }
    .fab-panel { position: fixed; bottom: 100px; right: 24px; z-index: 1000; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    @media (max-width: 640px) {
      .fab-button { bottom: 16px; right: 16px; }
      .fab-panel { bottom: 90px; right: 16px; left: 16px; }
      h1 { font-size: 28px !important; }
    }
  </style>
</head>
<body class="gradient-bg min-h-screen pb-40 sm:pb-32">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-purple-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 floating"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-pink-500 rounded-full mix-blend-multiply filter blur-3xl opacity-20 floating" style="animation-delay: -1.5s;"></div>
  </div>

  <div class="relative max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <header class="text-center mb-8">
      <div class="inline-block mb-4"><div class="text-5xl sm:text-6xl floating">🏠</div></div>
      <h1 class="text-3xl sm:text-4xl font-extrabold text-white mb-2">一搬不丢</h1>
      <p class="text-purple-100 text-base sm:text-lg font-light mb-3">Cherry Pick</p>
      <div class="w-16 h-1 bg-gradient-to-r from-purple-400 to-pink-400 mx-auto rounded-full"></div>
      <p class="text-purple-200/70 text-xs sm:text-sm mt-3">一直搬家，东西也不会弄丢</p>
      <a href="/www/" class="inline-flex items-center gap-2 text-purple-200 hover:text-white transition-colors mt-4 text-sm"><span>←</span> 返回首页</a>
    </header>

    <div id="statsCard" class="grid grid-cols-3 gap-3 sm:gap-4 mb-6 hidden">
      <div class="glass-card rounded-2xl p-3 sm:p-4 text-center">
        <div class="text-2xl sm:text-3xl font-extrabold bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent" id="totalItems">0</div>
        <div class="text-xs text-gray-600 font-medium mt-1">总物品</div>
      </div>
      <div class="glass-card rounded-2xl p-3 sm:p-4 text-center">
        <div class="text-2xl sm:text-3xl font-extrabold bg-gradient-to-r from-green-500 to-emerald-500 bg-clip-text text-transparent" id="syncedItems">0</div>
        <div class="text-xs text-gray-600 font-medium mt-1">已同步</div>
      </div>
      <div class="glass-card rounded-2xl p-3 sm:p-4 text-center">
        <div class="text-2xl sm:text-3xl font-extrabold bg-gradient-to-r from-amber-500 to-orange-500 bg-clip-text text-transparent" id="pendingItems">0</div>
        <div class="text-xs text-gray-600 font-medium mt-1">待拆封</div>
      </div>
    </div>

    <div class="glass-card rounded-2xl sm:rounded-3xl p-4 sm:p-6 mb-6">
      <div class="flex items-center gap-3 mb-4">
        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-xl">📦</div>
        <h2 class="text-lg sm:text-xl font-bold text-gray-800">创建搬家活动</h2>
      </div>
      <div class="flex gap-3">
        <input type="text" id="moveName" placeholder="搬家名称（如：搬到新家）" class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-100 outline-none transition-all text-gray-700 text-sm sm:text-base">
        <button onclick="createMove()" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-5 py-3 rounded-xl font-semibold hover:shadow-lg transition-all whitespace-nowrap">创建</button>
      </div>
    </div>

    <div id="movesList" class="space-y-4 mb-20"></div>
  </div>

  <!-- 悬浮按钮 -->
  <button onclick="togglePanel()" class="fab-button bg-gradient-to-r from-purple-500 to-pink-500 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center text-2xl hover:shadow-purple-500/50">
    <span id="fabIcon">💬</span>
  </button>

  <!-- 展开面板 -->
  <div id="fabPanel" class="fab-panel hidden">
    <div class="glass-card rounded-2xl sm:rounded-3xl p-4 sm:p-6 shadow-2xl expand-in max-w-md w-full">
      <div class="flex items-center justify-between mb-4 pb-3 border-b border-gray-100">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center text-xl">💬</div>
          <div>
            <h3 class="text-base font-bold text-gray-800">快速添加</h3>
            <p class="text-xs text-gray-500">通过对话添加物品</p>
          </div>
        </div>
        <button onclick="showSettings()" class="text-gray-400 hover:text-purple-500 transition-colors p-2" title="提示词设置">⚙️</button>
      </div>
      
      <div class="mb-4">
        <textarea id="messageInput" placeholder="描述要添加的物品，例如：&#10;• 帮我记录搬家物品：书籍&#10;• 记录物品：电脑，打包前客厅，打包后纸箱 1" rows="3" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-100 outline-none transition-all text-gray-700 text-sm resize-none"></textarea>
      </div>
      
      <button onclick="sendMessage()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all flex items-center justify-center gap-2">
        <span>📤</span>
        <span>发送</span>
      </button>
      
      <div class="mt-4 pt-4 border-t border-gray-100">
        <p class="text-xs text-gray-400 mb-2">试试这样说：</p>
        <div class="flex flex-wrap gap-2">
          <button onclick="fillExample('帮我记录搬家物品：书籍，打包前书房，打包后纸箱 1')" class="text-xs px-3 py-1.5 bg-purple-50 text-purple-600 rounded-full hover:bg-purple-100 transition-all">📦 记录物品</button>
          <button onclick="fillExample('创建搬家活动：搬到新家')" class="text-xs px-3 py-1.5 bg-pink-50 text-pink-600 rounded-full hover:bg-pink-100 transition-all">🏠 创建活动</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 设置模态框 -->
  <div id="settingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-[10000] hidden flex items-center justify-center p-4">
    <div class="glass-card rounded-3xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-hidden modal">
      <div class="bg-gradient-to-r from-purple-500 to-pink-500 px-6 py-4 flex items-center justify-between">
        <h2 class="text-xl font-bold text-white">⚙️ 提示词设置</h2>
        <button onclick="hideSettings()" class="text-white hover:text-purple-200 transition-colors text-2xl">✕</button>
      </div>
      <div class="p-6 overflow-y-auto max-h-[70vh]">
        <div class="bg-purple-50 border border-purple-200 rounded-xl p-4 mb-4">
          <h4 class="text-sm font-semibold text-purple-800 mb-2">💡 提示词说明</h4>
          <ul class="text-xs text-purple-700 space-y-1">
            <li>• 提示词会附加在用户消息前面</li>
            <li>• 告诉 AI 如何理解意图</li>
            <li>• 指定返回的 JSON 格式</li>
            <li>• 修改后点击"保存"生效</li>
          </ul>
        </div>
        
        <div class="mb-4">
          <label class="block text-sm font-semibold text-gray-700 mb-2">
            📝 系统提示词
          </label>
          <textarea id="systemPrompt" rows="12" class="w-full px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 outline-none text-sm font-mono"></textarea>
        </div>
        
        <div class="flex justify-between items-center">
          <button onclick="resetPrompt()" class="text-gray-600 hover:text-gray-800 text-sm font-medium">
            🔄 恢复默认
          </button>
          <div class="flex gap-3">
            <button onclick="hideSettings()" class="px-5 py-2.5 rounded-xl border-2 border-gray-200 text-gray-700 font-medium hover:bg-gray-100 transition-all">
              取消
            </button>
            <button onclick="saveSettings()" class="px-5 py-2.5 rounded-xl bg-gradient-to-r from-purple-500 to-pink-500 text-white font-medium hover:shadow-lg transition-all">
              💾 保存设置
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let currentMoveId = null;
    let panelOpen = false;
    let allItems = [];

    function togglePanel() {
      panelOpen = !panelOpen;
      const panel = document.getElementById('fabPanel');
      const icon = document.getElementById('fabIcon');
      if (panelOpen) {
        panel.classList.remove('hidden');
        icon.textContent = '✕';
      } else {
        panel.classList.add('hidden');
        icon.textContent = '💬';
      }
    }

    // 使用共享的 agent-chat 组件
    // fillExample, sendMessage, showResult 等函数由 agent-chat.js 提供

    async function loadMoves() {
      const res = await fetch('/cherry-pick/api/moves');
      const result = await res.json();
      const moves = result.data || result || [];
      const container = document.getElementById('movesList');
      
      if (moves.length === 0) {
        container.innerHTML = '<div class="glass-card rounded-2xl sm:rounded-3xl p-12 text-center"><div class="text-5xl mb-4">📭</div><p class="text-gray-400">暂无搬家记录</p></div>';
        document.getElementById('statsCard').classList.add('hidden');
        return;
      }

      document.getElementById('statsCard').classList.remove('hidden');

      container.innerHTML = moves.map(move => `
        <div class="glass-card rounded-2xl sm:rounded-3xl p-4 sm:p-6">
          <div class="flex justify-between items-start mb-4">
            <div class="flex-1">
              <h3 class="text-lg sm:text-xl font-bold text-gray-800">${escapeHtml(move.name)}</h3>
              <p class="text-xs text-gray-400 mt-1">${new Date(move.created_at * 1000).toLocaleString('zh-CN')}</p>
            </div>
            <button onclick="deleteMove('${move.id}')" class="text-gray-300 hover:text-red-500 transition-colors p-2">🗑️</button>
          </div>
          <button onclick="showItems('${move.id}')" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all">📋 管理物品</button>
          <div id="items-${move.id}" class="hidden border-t-2 border-gray-100 pt-4 mt-4">
            <div class="flex gap-3 mb-4">
              <input type="text" id="item-${move.id}" placeholder="物品名称" class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-purple-500 focus:ring-2 focus:ring-purple-100 outline-none transition-all text-gray-700 text-sm">
              <button onclick="addItem('${move.id}')" class="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-5 py-3 rounded-xl font-semibold hover:shadow-lg transition-all whitespace-nowrap">添加</button>
            </div>
            <div id="items-list-${move.id}" class="space-y-3"></div>
          </div>
        </div>
      `).join('');
    }

    async function showItems(moveId) {
      currentMoveId = moveId;
      const el = document.getElementById(`items-${moveId}`);
      el.classList.toggle('hidden');
      if (!el.classList.contains('hidden')) {
        await loadItems(moveId);
        updateStats();
      }
    }

    async function loadItems(moveId) {
      const res = await fetch(`/cherry-pick/api/moves/${moveId}/items`);
      const result = await res.json();
      const items = result.data || result || [];
      allItems = items;
      const container = document.getElementById(`items-list-${moveId}`);

      if (items.length === 0) {
        container.innerHTML = '<div class="text-center py-8 text-gray-400">暂无物品，添加一些吧~</div>';
        return;
      }

      container.innerHTML = items.map(item => {
        let statusClass = 'item-pending';
        let statusText = '⏳ 待拆封';
        let statusColor = 'text-amber-600';
        
        if (item.after_location && item.after_location !== '未指定' && item.after_location !== '') {
          statusClass = 'item-done';
          statusText = '✅ 已同步';
          statusColor = 'text-blue-600';
        }
        
        // 确保字段存在
        const beforeLoc = item.before_location || '';
        const packLoc = item.pack_location || '';
        const afterLoc = item.after_location || '';
        
        return `
        <div class="item-card rounded-xl p-4 ${statusClass}">
          <div class="flex justify-between items-start mb-3">
            <div class="flex-1">
              <h4 class="font-bold text-gray-800 mb-2">${escapeHtml(item.name)}</h4>
              <div class="space-y-2 text-xs">
                <div class="flex items-center gap-2">
                  <span class="text-gray-500 w-16 flex-shrink-0">📍 打包前：</span>
                  <input type="text" value="${escapeHtml(beforeLoc)}" onblur="updateItem('${item.id}', {before_location: this.value})" class="flex-1 px-2 py-1 rounded border border-gray-200 focus:border-purple-500 outline-none" placeholder="原位置">
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-gray-500 w-16 flex-shrink-0">📦 打包后：</span>
                  <input type="text" value="${escapeHtml(packLoc)}" onblur="updateItem('${item.id}', {pack_location: this.value})" class="flex-1 px-2 py-1 rounded border border-gray-200 focus:border-purple-500 outline-none" placeholder="打包位置">
                </div>
                <div class="flex items-center gap-2">
                  <span class="text-gray-500 w-16 flex-shrink-0">🏠 拆封后：</span>
                  <input type="text" value="${escapeHtml(afterLoc)}" onblur="updateItem('${item.id}', {after_location: this.value})" class="flex-1 px-2 py-1 rounded border border-gray-200 focus:border-green-500 outline-none" placeholder="填写后自动同步到 Momhand">
                </div>
              </div>
            </div>
            <div class="flex flex-col items-end gap-2">
              <span class="text-xs font-semibold ${statusColor}">${statusText}</span>
              <button onclick="deleteItem('${item.id}')" class="text-gray-300 hover:text-red-500 transition-colors text-sm">🗑️</button>
            </div>
          </div>
        </div>
      `}).join('');
    }

    function updateStats() {
      const total = allItems.length;
      const synced = allItems.filter(i => i.after_location && i.after_location !== '未指定').length;
      const pending = total - synced;
      document.getElementById('totalItems').textContent = total;
      document.getElementById('syncedItems').textContent = synced;
      document.getElementById('pendingItems').textContent = pending;
    }

    async function createMove() {
      const name = document.getElementById('moveName').value.trim();
      if (!name) return alert('请输入搬家名称');
      
      try {
        const response = await fetch('/cherry-pick/api/moves', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        const newMove = await response.json();
        
        document.getElementById('moveName').value = '';
        await loadMoves();
        
        // 创建成功后自动展开新项目的物品列表
        if (newMove.id) {
          setTimeout(() => {
            showItems(newMove.id);
            // 滚动到新项目位置
            const element = document.querySelector(`#items-${newMove.id}`);
            if (element) {
              element.scrollIntoView({ behavior: 'smooth', block: 'center' });
              // 聚焦到物品输入框
              const input = document.getElementById(`item-${newMove.id}`);
              if (input) input.focus();
            }
          }, 300);
        }
      } catch (error) {
        console.error('创建搬家活动失败:', error);
        alert('创建失败，请重试');
      }
    }

    async function addItem(moveId) {
      const input = document.getElementById(`item-${moveId}`);
      const name = input.value.trim();
      if (!name) return alert('请输入物品名称');
      await fetch(`/cherry-pick/api/moves/${moveId}/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      input.value = '';
      await loadItems(moveId);
      updateStats();
    }

    async function updateItem(itemId, data) {
      console.log('更新物品:', itemId, data);
      
      try {
        const response = await fetch(`/cherry-pick/api/items/${itemId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        console.log('更新结果:', result);
        
        // 如果更新了 after_location，同步到 Momhand
        if (data.after_location !== undefined && data.after_location && data.after_location !== '未指定' && data.after_location !== '') {
          showResult('🔄 正在同步到 Momhand...', 'info');
          try {
            // 重新加载物品信息获取最新数据
            const res = await fetch(`/cherry-pick/api/moves/${currentMoveId}/items`);
            const items = await res.json();
            const item = items.find(i => i.id === itemId);
            
            if (item) {
              // 添加到 Momhand
              await fetch('/momhand/api/items', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  name: item.name,
                  type: '搬家物品',
                  location: data.after_location,
                  usage: `从搬家同步：打包前=${item.before_location || '未指定'}, 打包后=${item.pack_location || '未指定'}`
                })
              });
              showResult('✅ 已同步到 Momhand', 'success');
            }
          } catch (error) {
            console.error('同步失败:', error);
            showResult('⚠️ 同步失败，但位置已更新', 'warning');
          }
        }
      } catch (error) {
        console.error('更新失败:', error);
        showResult('❌ 更新失败', 'error');
      }
      
      if (currentMoveId) {
        await loadItems(currentMoveId);
        updateStats();
      }
    }

    async function deleteMove(moveId) {
      if (!confirm('确定删除此搬家记录及所有物品？')) return;
      await fetch(`/cherry-pick/api/moves/${moveId}`, { method: 'DELETE' });
      loadMoves();
    }

    async function deleteItem(itemId) {
      if (!confirm('确定删除此物品？')) return;
      await fetch(`/cherry-pick/api/items/${itemId}`, { method: 'DELETE' });
      if (currentMoveId) {
        await loadItems(currentMoveId);
        updateStats();
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ========== 提示词设置 ==========
    const DEFAULT_SYSTEM_PROMPT = `你是 WebViewer 的助手 Dummy，负责处理用户的出行、搬家和物品记录请求。

用户消息："{message}"

可用项目：
1. 出行相关（出差、旅行、出行）→ By Design (/bydesign/)
   - 动作：创建出行记录
   - API: POST /bydesign/api/trips
   - 数据：{name, description}

2. 搬家相关（搬家、打包、物品记录）→ Cherry Pick (/cherry-pick/)
   - 动作：记录物品位置
   - API: POST /cherry-pick/api/moves/{moveId}/items
   - 数据：{name, before_location, after_location}

3. 物品相关（找、查询、记录位置）→ Momhand (/momhand/)
   - 动作：添加/搜索物品
   - API: POST /momhand/api/items 或 GET /momhand/api/search?q=xxx
   - 数据：{name, type, location, usage}

处理规则：
1. 如果用户想记录出行、搬家、物品等信息：
   - 选择合适的项目
   - **执行具体的记录动作**（调用相应的 API 保存数据）
   - 返回 success=true，包含 project、action、data、refresh

2. 如果用户是问候、闲聊、提问（如"你好"、"你是谁"、"能做什么"）：
   - 正常对话回复
   - 返回 success=false，project=null，action=null
   - message 字段回复用户的问题

**重要要求：**
- message 字段使用简洁的中文，**不要使用任何表情符号（emoji）**
- 只返回必要的文字信息，保持专业简洁
